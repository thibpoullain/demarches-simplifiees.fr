version: "3.7"
services:
  db:
    image: postgres
    environment:
      POSTGRES_DB: tps_development
      POSTGRES_USER: tps_development
      POSTGRES_PASSWORD: tps_development
    ports:
      - "5432:5432"
    volumes:
      # Ajout du volume qui contient les scripts d'initialisation de la DB lors du lancement du container
      - '../docker:/docker-entrypoint-initdb.d'
  webapp-main:
    build:
      context: ..
      dockerfile: docker/Dockerfile.dev
    env_file:
      - dev.env.mandatory
      - .env.optional
    links:
      - db
      - sftp
    ports:
      - "3000:3000"
    depends_on:
      - db
    volumes:
      - '..:/opt/ds'
      - demat-dev_gems:/opt/ds/tmp/
      - demat-dev_node-modules:/opt/ds/node_modules
  sftp:
    image: atmoz/sftp
    volumes:
        - ../sftp_fake/upload:/home/foo
        - ../sftp_fake/ssh_keys/id_rsa.pub:/home/foo/.ssh/keys/id_rsa.pub:ro
    ports:
        - "2222:22"
    command: foo::1001
volumes:
  demat-dev_node-modules:
  demat-dev_gems:
