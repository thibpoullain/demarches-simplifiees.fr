version: "3.7"
services:
  db:
    image: postgres
    #https://hub.docker.com/_/postgres
    environment:
      POSTGRES_DB: tps_prod
      POSTGRES_USER: tps_prod
      POSTGRES_PASSWORD: tps_prod
    ports:
      - "5432:5432"
  webapp-main:
    image: social-gouv-fr/demat:latest
    command:
      - deploy start
    #En l'absence de nginx, service des ressources statiques par le puma + pas de SSL
    environment:
      - RAILS_SERVE_STATIC_FILES=1
      - SSL_FORCE=disabled
      - SENTRY_ENABLED=enabled
      - SENTRY_DSN_RAILS=https://a711d3a3c5fe4ed18aa7ccb0387d4aa8@o1038574.ingest.sentry.io/6006960
      - SENTRY_DSN_JS=https://ebeeb010a4ae4b45ad5a89f9542338bb@o1038574.ingest.sentry.io/6007020
    env_file:
      - .env.mandatory
      - .env.optional
    ports:
      - "3000:3000"
    links:
      - db
    depends_on:
      - db
    volumes:
      - demat_public_assets:/opt/ds/public
  webapp-alt:
    image: social-gouv-fr/demat:latest
    command:
      - start
    #En l'absence de nginx, service des ressources statiques par le puma + pas de SSL
    environment:
      - RAILS_SERVE_STATIC_FILES=1
      - SSL_FORCE=disabled
      - SENTRY_ENABLED=enabled
      - SENTRY_DSN_RAILS=https://a711d3a3c5fe4ed18aa7ccb0387d4aa8@o1038574.ingest.sentry.io/6006960
      - SENTRY_DSN_JS=https://ebeeb010a4ae4b45ad5a89f9542338bb@o1038574.ingest.sentry.io/6007020
    env_file:
      - .env.mandatory
      - .env.optional
    ports:
      - "3000"
    links:
      - db
    depends_on:
      - webapp-main
    volumes:
      - demat_public_assets:/opt/ds/public:ro
  jobs:
    image: social-gouv-fr/demat:latest
    command:
      - schedule_jobs
    environment:
      - SENTRY_ENABLED=enabled
      - SENTRY_DSN_RAILS=https://a711d3a3c5fe4ed18aa7ccb0387d4aa8@o1038574.ingest.sentry.io/6006960
    env_file:
      - .env.mandatory
      - .env.optional
    links:
      - db
    depends_on:
      - db
      - webapp-main
    #Le service job doit envoyer des mails dont le contenu est généré par la précompilation des assets
    volumes:
      - demat_public_assets:/opt/ds/public:ro
volumes:
  demat_public_assets:
