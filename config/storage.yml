local:
  service: Disk
  root: <%= Rails.root.join("storage") %>
test:
  service: Disk
  root: <%= Rails.root.join("tmp/storage") %>
openstack:
  service: OpenStack
  container: "<%= ENV['FOG_ACTIVESTORAGE_DIRECTORY'] %>"
  credentials:
    openstack_auth_url: "https://auth.cloud.ovh.net"
    openstack_api_key: "<%= ENV['FOG_OPENSTACK_API_KEY'] %>"
    openstack_username: "<%= ENV['FOG_OPENSTACK_USERNAME'] %>"
    openstack_region: "<%= ENV['FOG_OPENSTACK_REGION'] %>"
    openstack_temp_url_key: "<%= ENV['FOG_OPENSTACK_TEMP_URL_KEY'] %>"
s3:
  service: S3
  endpoint: "<%= ENV['S3_ENDPOINT'] %>"
  access_key_id: "<%= ENV['S3_ACCESS_KEY_ID'] %>"
  secret_access_key: "<%= ENV['S3_SECRET_ACCESS_KEY'] %>"
  region: "<%= ENV['S3_REGION'] %>"
  # Clés possibles : https://docs.aws.amazon.com/sdk-for-ruby/v3/api/Aws/S3/Client.html#initialize-instance_method
  bucket: "<%= ENV['S3_BUCKET'] %>"
  # Pour compatibilité cegedim
  force_path_style: true
  http_proxy: "<%= ENV['S3_HTTP_PROXY'] %>"
  # Clé utiles en debug : trace de chaque connexion et requête au service S3
  #http_wire_trace: true
