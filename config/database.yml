default: &default
  adapter: postgresql
  encoding: unicode
  pool: <%= ENV.fetch("DB_POOL") { 5 } %>
  timeout: 5000
  username: <%= ENV["DB_USERNAME"] %>
  password: <%= ENV["DB_PASSWORD"] %>
  host: <%= ENV["DB_HOST"] %>
  variables:
    statement_timeout: <%= ENV['PG_STATEMENT_TIMEOUT'] || 60000 %>

development:
  database: tps_development
  <<: *default
  # Workaround for https://github.com/ged/ruby-pg/issues/311
  gssencmode: disable

test:
  database: "tps_test_<%= ENV['TEST_ENV_NUMBER'] || '' %>"
  <<: *default
  # Workaround for https://github.com/ged/ruby-pg/issues/311
  gssencmode: disable

production: &production
  database: <%= ENV["DB_DATABASE"] %>
  <<: *default
